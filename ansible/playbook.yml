---
# CS686 Assignment 11 — Ansible Playbook
# Targets all 6 private EC2 instances (3 Ubuntu + 3 Amazon Linux)
# Tasks:
#   1. Update and upgrade packages
#   2. Verify Docker is installed and running at the latest version
#   3. Report disk usage

- name: CS686 A11 — System maintenance and Docker verification
  hosts: all
  become: true
  gather_facts: true

  tasks:

    # ── 1. Update & upgrade packages ─────────────────────────────────────────

    - name: Update apt cache (Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages (Ubuntu)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      when: ansible_os_family == "Debian"
      register: apt_upgrade_result

    - name: Update all packages (Amazon Linux)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
      when: ansible_os_family == "RedHat"
      register: dnf_update_result

    - name: Show update result (Ubuntu)
      ansible.builtin.debug:
        msg: "apt upgrade: {{ apt_upgrade_result.changed | default(false) | ternary('packages updated', 'already up to date') }}"
      when: ansible_os_family == "Debian"

    - name: Show update result (Amazon Linux)
      ansible.builtin.debug:
        msg: "dnf update: {{ dnf_update_result.changed | default(false) | ternary('packages updated', 'already up to date') }}"
      when: ansible_os_family == "RedHat"

    # ── 2. Verify Docker is installed and running at latest version ───────────

    - name: Install Docker prerequisites (Ubuntu)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (Ubuntu)
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc
      when: ansible_os_family == "Debian"

    - name: Add Docker apt repository (Ubuntu)
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -y
      args:
        creates: /etc/apt/sources.list.d/docker.list
      when: ansible_os_family == "Debian"

    - name: Install latest Docker Engine (Ubuntu)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install latest Docker Engine (Amazon Linux)
      ansible.builtin.dnf:
        name: docker
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Get Docker version
      ansible.builtin.command: docker version --format "{{ '{{' }}.Server.Version{{ '}}' }}"
      register: docker_version
      changed_when: false

    - name: Report Docker version on each host
      ansible.builtin.debug:
        msg: "HOST={{ inventory_hostname }} | OS={{ ansible_distribution }} {{ ansible_distribution_version }} | Docker={{ docker_version.stdout }}"

    # ── 3. Report disk usage ──────────────────────────────────────────────────

    - name: Gather disk usage
      ansible.builtin.command: df -h
      register: disk_usage
      changed_when: false

    - name: Report disk usage for each instance
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════
          HOST : {{ inventory_hostname }}
          OS   : {{ ansible_distribution }} {{ ansible_distribution_version }}
          ────────────────────────────────────────
          {{ disk_usage.stdout }}
          ════════════════════════════════════════
